<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Fuel Market Dashboard</title>
</head>
<body>

<nav>
    <div>Dashboard</div>
    <ul>
        <li><a href="#price">Giá</a></li>
        <li><a href="#news">Tin Tức</a></li>
        <li><a href="#report">Báo cáo</a></li>
        <li><a href="#margin">Margin</a></li>
    </ul>
</nav>

<main>
    <section id="price" class="active">
    <h2>Giá nhiên liệu</h2>

    <!-- Filter -->
    <div id="filter-bar">
        <select id="product-filter"></select>
        <select id="days-filter">
            <option value="30">30 ngày</option>
            <option value="60">60 ngày</option>
            <option value="90">90 ngày</option>
        </select>
        <button id="filter-btn">Lọc</button>
    </div>

    <!-- Layout 2 cột -->
    <div id="price-layout">
        <table id="price-table">
            <thead>
                <tr>
                    <th>Ngày</th>
                    <th>Giá</th>
                    <th>Đơn vị</th>
                </tr>
            </thead>
            <tbody id="price-body"></tbody>
        </table>

        <canvas id="price-chart"></canvas>
    </div>
</section>

<section id="margin">
    <h2>Margin Dashboard</h2>

    <!-- Cards tóm tắt -->
    <div id="margin-cards">
        <div class="card">
            <div class="card-title">Dubai FCC</div>
            <div class="card-value" id="dubai-latest">-</div>
        </div>
        <div class="card">
            <div class="card-title">Dated Brent</div>
            <div class="card-value" id="brent-latest">-</div>
        </div>
        <div class="card">
            <div class="card-title">Global Composite</div>
            <div class="card-value" id="global-latest">-</div>
        </div>
    </div>

    <!-- Chart -->
    <canvas id="margin-chart"></canvas>

    <!-- Bảng -->
    <table id="margin-table">
        <thead>
            <tr>
                <th>Tháng</th>
                <th>Dubai FCC</th>
                <th>Dated Brent</th>
                <th>Global Composite</th>
            </tr>
        </thead>
        <tbody id="margin-body"></tbody>
    </table>
</section>

    <section id="news">
        <h2>Tin tức thị trường</h2>
        <table id="news-table">
            <thead>
                <tr>
                    <th>Tiêu đề</th>
                    <th>Danh mục</th>
                    <th>Ngày</th>
                </tr>
            </thead>
            <tbody id="news-body">
            </tbody>
        </table>
    </section>

    <section id="report">
        <h2>Báo cáo tổng hợp</h2>
        <table id="report-table">
            <thead>
                <tr>
                    <th>Tên chỉ số</th>
                    <th>Giá trị</th>
                    <th>Đơn vị</th>
                    <th> Danh mục </th>
                    <th>Ngày</th>
                </tr>
            </thead>
            <tbody id="report-body">
            </tbody>
        </table>
    </section>
</main>

<script src="main.js"></script> </body>
</body>
</html>
